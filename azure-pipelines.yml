# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  name: Linux-Agent  # Specify the name of your custom agent pool

# Static site — cPanel-style flat layout. index.html lives at the repo root.
# /legacy and /assets are archived and excluded from the published artifact.
steps:
- script: |
    echo "Staging site from repo root, excluding legacy/ and assets/"
    mkdir -p $(Build.ArtifactStagingDirectory)/site
    rsync -a --exclude 'legacy/' --exclude 'assets/' --exclude '.git/' \
      --exclude '.github/' --exclude '.vscode/' --exclude 'node_modules/' \
      --exclude '*.md' --exclude 'package.json' --exclude 'amplify.yml' \
      --exclude 'azure-pipelines.yml' --exclude 'changelog.txt' --exclude 'LICENSE' \
      ./ $(Build.ArtifactStagingDirectory)/site/
  displayName: 'Stage deployable site'

- task: PublishPipelineArtifact@1
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)/site'
    artifact: 'site'
    publishLocation: 'pipeline'
  displayName: 'Publish site as pipeline artifact'
