on: 
  push:
    branches:
      - main
name: Publish Website to CPanel
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.6
      with:
        server: ${{ secrets.MB_FTP_SERVER }}
        username: ${{ secrets.MB_FTP_USERNAME }}
        password: ${{ secrets.MB_FTP_CONNECT }}
        protocol: ftps                            # ⬅ important for many cPanel hosts
        port: 21
        exclude: |
          **/.git/**
          **/.github/**
          **/.vscode/**
          **/.claude/**
          **/.history/**
          **/node_modules/**
          **/assets/**
          **/legacy/**
          .gitattributes
          .tmp-portfolio-title.png
          amplify.yml
          azure-pipelines.yml
          changelog.txt
          LICENSE
          README.md