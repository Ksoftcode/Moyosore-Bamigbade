version: 1
frontend:
  phases:
    build:
      commands: []
  artifacts:
    # cPanel-style flat layout — index.html lives at the repo root.
    baseDirectory: /
    files:
      - '**/*'
      - '!legacy/**'
      - '!assets/**'
      - '!**/*.md'
      - '!package.json'
      - '!amplify.yml'
      - '!azure-pipelines.yml'
      - '!changelog.txt'
      - '!LICENSE'
  cache:
    paths: []
